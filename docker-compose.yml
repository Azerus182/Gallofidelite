services:
  php:
    build: .
    container_name: gallofidelite_php
    ports:
      - "8080:80"
    volumes:
      - ./source:/var/www/html
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11
    container_name: gallofidelite_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - gallofidelite_mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gallofidelite_phpmyadmin
    restart: always
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"

volumes:
  gallofidelite_mariadb_data: